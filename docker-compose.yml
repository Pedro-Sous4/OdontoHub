services:
  api:
    build: ./backend
    environment:
      SERVICE_CMD: dev:gateway
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/odontohub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
      BYPASS_AUTH: 'true'
      BYPASS_TENANT_ID: '00000000-0000-0000-0000-000000000000'
      USE_CONTAINER_HOSTS: 'true'
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app:cached
      - backend_node_modules:/app/node_modules
    depends_on:
      - postgres
      - redis
      - minio
      - auth-service

  auth-service:
    build: ./backend
    environment:
      SERVICE_CMD: dev:auth
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/odontohub
