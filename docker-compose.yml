      BYPASS_TENANT_ID: '00000000-0000-0000-0000-000000000000'
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: odonto-files
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
